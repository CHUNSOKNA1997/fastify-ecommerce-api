services:
  - type: web
    name: fastify-ecommerce-api
    runtime: docker
    plan: free
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: MONGODB_URI
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_AVATAR_BUCKET
        value: avatars
      - key: ACCESS_TOKEN_TTL
        value: 1h
      - key: REFRESH_TOKEN_TTL_DAYS
        value: "30"
      - key: RESET_PASSWORD_TOKEN_TTL_MINUTES
        value: "15"
